<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- ===== 主菜单 ===== -->
        <div id="menu-screen">
            <h1><span class="chess-icon">♔</span> 中国象棋</h1>
            <p class="subtitle">支持本地对弈 · AI 对战 · 局域网联机</p>

            <div id="menu-buttons">
                <button class="menu-btn" id="btn-local">
                    <span class="btn-icon">👥</span> 本地对弈
                </button>
                <button class="menu-btn" id="btn-ai">
                    <span class="btn-icon">🤖</span> AI 对战
                </button>
                <button class="menu-btn" id="btn-online">
                    <span class="btn-icon">🌐</span> 局域网联机
                </button>
            </div>

            <!-- AI 选项 -->
            <div id="ai-options">
                <h2>🤖 AI 对战设置</h2>
                <div class="option-group">
                    <label>选择难度</label>
                    <select id="ai-difficulty">
                        <option value="easy">初级 — 搜索3层</option>
                        <option value="medium" selected>中级 — 搜索5层</option>
                        <option value="hard">高级 — 搜索8层</option>
                        <option value="claude">大模型 — Claude AI</option>
                    </select>
                </div>
                <div class="option-group" id="api-key-group" style="display:none">
                    <label>API Base URL</label>
                    <input type="text" id="claude-api-url" placeholder="例: https://api.anthropic.com" value="https://api.anthropic.com">
                    <label style="margin-top:8px">API Key</label>
                    <input type="password" id="claude-api-key" placeholder="sk-...">
                </div>
                <div class="option-group">
                    <label>选择阵营</label>
                    <select id="ai-side">
                        <option value="red">红方（先手）</option>
                        <option value="black">黑方（后手）</option>
                    </select>
                </div>
                <div class="btn-row">
                    <button class="menu-btn btn-secondary" id="btn-ai-back">返回</button>
                    <button class="menu-btn" id="btn-ai-start">开始对战</button>
                </div>
            </div>

            <!-- 联机选项 -->
            <div id="online-options">
                <h2>🌐 局域网联机</h2>
                <div class="option-group">
                    <label>服务器地址</label>
                    <input type="text" id="server-ip" placeholder="例: 192.168.1.100" value="localhost">
                </div>
                <div class="option-group">
                    <label>端口</label>
                    <input type="text" id="server-port" placeholder="默认 3000" value="3000">
                </div>
                <div class="option-group">
                    <label>房间号（加入时填写）</label>
                    <input type="text" id="room-id-input" placeholder="留空则创建新房间">
                </div>
                <div class="btn-row">
                    <button class="menu-btn" id="btn-create-room">创建房间</button>
                    <button class="menu-btn" id="btn-join-room">加入房间</button>
                </div>
                <button class="menu-btn btn-secondary" id="btn-online-back" style="width:100%">返回</button>
                <p id="online-status"></p>
            </div>

            <!-- 等待房间 -->
            <div id="waiting-room">
                <h2>等待对手加入</h2>
                <p>房间号</p>
                <div class="room-code" id="room-id-display">----</div>
                <p class="waiting-text">请将房间号告诉对手...</p>
                <button class="menu-btn btn-secondary" onclick="game.backToMenu()">取消</button>
            </div>
        </div>

        <!-- ===== 游戏界面 ===== -->
        <div id="game-screen">
            <div id="game-status">准备开始</div>
            <canvas id="chessBoard" width="520" height="580"></canvas>
            <div class="game-controls">
                <button class="game-btn" id="btn-undo">⏪ 悔棋</button>
                <button class="game-btn danger" id="btn-resign">🏳️ 认输</button>
                <button class="game-btn" id="btn-back-menu">🏠 返回</button>
            </div>
        </div>
    </div>

    <script src="js/rules.js"></script>
    <script src="js/board.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/network.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
